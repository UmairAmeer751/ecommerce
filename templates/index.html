<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexShop | Premium Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <header class="navbar">
        <div class="logo">NexShop<span>.</span></div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#products">Shop</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
        <div class="cart-icon">
            🛒 <span id="cart-count" class="badge">0</span>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Elevate Your Tech Lifestyle</h1>
            <p>Discover our curated collection of premium gadgets and accessories designed for the modern world.</p>
            <a href="#products" class="btn-primary">Shop Now</a>
        </div>
    </section>

    <main class="container" id="products">
        <h2 class="section-title">Trending Now</h2>
        <div class="product-grid" id="product-grid">
            <!-- Products will be dynamically injected here -->
            <div class="loader">Loading products...</div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 NexShop. Designed for DevOps Lab Exam.</p>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>

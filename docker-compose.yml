# ============================================================

# NexShop 3-Tier Docker Compose — FA23-BCS-209
# Services: frontend (Nginx) | backend (Flask) | db (PostgreSQL)
# ============================================================

services:

  # ── Database ────────────────────────────────────────────────
  db:
    build: ./database
    container_name: ecommerce-db
    environment:
      POSTGRES_DB:       ecommerce
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: secret123
    volumes:
      - db_data:/var/lib/postgresql/data   # persisted volume
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend (Flask API) ─────────────────────────────────────
  backend:
    build: ./backend
    container_name: ecommerce-backend
    environment:
      DATABASE_URL: postgresql://admin:secret123@db:5432/ecommerce
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Frontend (Nginx) ────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: ecommerce-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

# ── Shared Network ───────────────────────────────────────────
networks:
  ecommerce-network:
    driver: bridge

# ── Named Volume (DB persistence) ───────────────────────────
volumes:
  db_data:
    driver: local
